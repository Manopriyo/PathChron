<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTube</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f4f4f4;
    color: #333;
    text-align: center;
}

header {
    background: #ffffff;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
}

.container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

input {
    width: 70%;
    padding: 8px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}

iframe {
    width: 100%;
    height: 400px;
    margin-top: 15px;
    border: none;
}

textarea {
    width: 100%;
    height: 250px;
    margin-top: 15px;
    padding: 10px;
    font-size: 14px;
}

.dark-mode {
    background: #121212;
    color: white;
}

.dark-mode textarea {
    background: #1e1e1e;
    color: white;
}

.dark-mode header {
    background: #1e1e1e;
    border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<header>StudyTube</header>

<div class="container">

<input type="text" id="youtubeLink" placeholder="Paste YouTube link here">
<button onclick="loadVideo()">Load</button>

<div id="videoContainer"></div>

<textarea id="notes" placeholder="Write your notes here..."></textarea>

<br>
<button onclick="addTimestamp()">Add Timestamp</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="toggleDarkMode()">🌙</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let playerTime = 0;

// Extract YouTube ID
function getYouTubeID(url) {
    let regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#\&\?]*).*/;
    let match = url.match(regExp);
    return (match && match[7].length == 11) ? match[7] : false;
}

// Load Video
function loadVideo() {
    let link = document.getElementById("youtubeLink").value;
    let videoID = getYouTubeID(link);

    if (videoID) {
        document.getElementById("videoContainer").innerHTML =
            `<iframe id="ytplayer" 
            src="https://www.youtube.com/embed/${videoID}?enablejsapi=1"
            allowfullscreen></iframe>`;
    } else {
        alert("Invalid YouTube link");
    }
}

// Auto Save Notes
let notesArea = document.getElementById("notes");

notesArea.value = localStorage.getItem("studyNotes") || "";

notesArea.addEventListener("input", function() {
    localStorage.setItem("studyNotes", notesArea.value);
});

// Add Timestamp (Manual input since no API used)
function addTimestamp() {
    let time = prompt("Enter timestamp (e.g., 12:45):");
    if (time) {
        notesArea.value += `\n[${time}] - `;
        localStorage.setItem("studyNotes", notesArea.value);
    }
}

// Download as PDF
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let text = notesArea.value;
    doc.text(text, 10, 10);
    doc.save("StudyNotes.pdf");
}

// Dark Mode
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
