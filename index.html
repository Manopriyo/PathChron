<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTube</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f4f4f4;
    color: #333;
    text-align: center;
}

header {
    background: #ffffff;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #ddd;
}

.container {
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

input {
    width: 70%;
    padding: 8px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}

#player {
    width: 100%;
    height: 400px;
    margin-top: 15px;
}

textarea {
    width: 100%;
    height: 200px;
    margin-top: 15px;
    padding: 10px;
    font-size: 14px;
}

.preview {
    text-align: left;
    margin-top: 15px;
    padding: 10px;
    background: #ffffff;
    border: 1px solid #ddd;
}

.preview a {
    color: blue;
    cursor: pointer;
    text-decoration: underline;
}

.dark-mode {
    background: #121212;
    color: white;
}

.dark-mode textarea,
.dark-mode .preview {
    background: #1e1e1e;
    color: white;
}

.dark-mode header {
    background: #1e1e1e;
    border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<header>StudyTube</header>

<div class="container">

<input type="text" id="youtubeLink" placeholder="Paste YouTube link here">
<button onclick="loadVideo()">Load</button>

<div id="player"></div>

<textarea id="notes" placeholder="Write notes with timestamps like 12:45 - Important concept"></textarea>

<div class="preview" id="preview"></div>

<br>
<button onclick="addTimestamp()">Add Timestamp</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="toggleDarkMode()">🌙</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let player;
let videoID = "";
let videoTitle = "";
let videoURL = "";

// YouTube API Ready
function onYouTubeIframeAPIReady() {}

// Extract Video ID
function getYouTubeID(url) {
    let regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#\&\?]*).*/;
    let match = url.match(regExp);
    return (match && match[7].length == 11) ? match[7] : false;
}

// Load Video
function loadVideo() {
    videoURL = document.getElementById("youtubeLink").value;
    videoID = getYouTubeID(videoURL);

    if (videoID) {
        player = new YT.Player('player', {
            height: '400',
            width: '100%',
            videoId: videoID
        });

        fetch(`https://www.youtube.com/oembed?url=${videoURL}&format=json`)
        .then(res => res.json())
        .then(data => {
            videoTitle = data.title;
        });
    } else {
        alert("Invalid YouTube link");
    }
}

// Auto Save Notes
let notesArea = document.getElementById("notes");
let previewDiv = document.getElementById("preview");

notesArea.value = localStorage.getItem("studyNotes") || "";
updatePreview();

notesArea.addEventListener("input", function() {
    localStorage.setItem("studyNotes", notesArea.value);
    updatePreview();
});

// Convert timestamps to clickable
function updatePreview() {
    let content = notesArea.value;
    let regex = /(\d+):(\d+)/g;

    content = content.replace(regex, function(match, m, s) {
        let seconds = parseInt(m)*60 + parseInt(s);
        return `<a onclick="seekTo(${seconds})">${match}</a>`;
    });

    previewDiv.innerHTML = content.replace(/\n/g, "<br>");
}

// Seek video
function seekTo(seconds) {
    if (player) {
        player.seekTo(seconds, true);
        player.playVideo();
    }
}

// Add Timestamp Automatically
function addTimestamp() {
    if (player) {
        let seconds = Math.floor(player.getCurrentTime());
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        let timestamp = `${m}:${s.toString().padStart(2,'0')}`;
        notesArea.value += `\n${timestamp} - `;
        localStorage.setItem("studyNotes", notesArea.value);
        updatePreview();
    }
}

// Download PDF
async function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(14);
    doc.text(videoTitle || "Study Notes", 10, 10);

    doc.setFontSize(10);
    doc.text(videoURL || "", 10, 18);

    doc.setFontSize(12);
    let text = doc.splitTextToSize(notesArea.value, 180);
    doc.text(text, 10, 30);

    doc.save("StudyNotes.pdf");
}

// Dark Mode
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
